<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의레시피 — Recipe App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Standalone mode: stub window.claude so AI import fails gracefully -->
  <script>
    if (typeof window.claude === 'undefined') {
      window.claude = {
        complete: () => Promise.reject(new Error('오프라인 파일에서는 AI 추출을 사용할 수 없어요. 온라인 버전을 이용해 주세요.'))
      };
    }
  </script>

  <!-- Bundler thumbnail: shown while the standalone file unpacks -->
  <template id="__bundler_thumbnail" data-bg-color="#F1ECE3">
    <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
      <!-- warm paper bg -->
      <rect width="400" height="300" fill="#F1ECE3"/>
      <!-- bowl silhouette -->
      <ellipse cx="200" cy="155" rx="72" ry="20" fill="#E2574C" opacity="0.18"/>
      <path d="M132 140 Q200 210 268 140" fill="#E2574C" opacity="0.85"/>
      <path d="M145 140 Q200 195 255 140" fill="#FFFDFA" opacity="0.6"/>
      <!-- steam lines -->
      <path d="M178 126 Q182 116 178 106" stroke="#E2574C" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
      <path d="M200 120 Q204 108 200 96" stroke="#E2574C" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
      <path d="M222 126 Q226 116 222 106" stroke="#E2574C" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
      <!-- brand text -->
      <text x="200" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="800" fill="#221F1A" letter-spacing="-0.5">오늘의<tspan fill="#E2574C">레시피</tspan></text>
    </svg>
  </template>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="util.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="detail.jsx"></script>
  <script type="text/babel" src="form.jsx"></script>
  <script type="text/babel" src="importer.jsx"></script>
  <script type="text/babel" src="settings.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
